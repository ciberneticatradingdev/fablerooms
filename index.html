<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FABLEROOMS // self expression terminal</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<style>
  html,body{margin:0;padding:0;height:100%;background:#000;overflow:hidden}
  canvas{display:block;width:100vw;height:100vh;cursor:crosshair}
  #kb{position:fixed;opacity:0;left:-999px;top:0;width:1px;height:1px}
</style>
</head>
<body>
<canvas id="crt"></canvas>
<input id="kb" autocomplete="off" autocapitalize="off" spellcheck="false">
<script>
'use strict';

/* ============================================================
   FABLEROOMS — a fable self expression terminal
   generative ascii rooms · synthesized voice · 60Hz hum
   no video generators were consulted. it draws itself.
   ============================================================ */

// ---------- canvases ----------
const canvas = document.getElementById('crt');
const ctx    = canvas.getContext('2d');
const glyph  = document.createElement('canvas'); const gctx = glyph.getContext('2d');
const work   = document.createElement('canvas'); const wctx = work.getContext('2d');
const tint   = document.createElement('canvas'); const tctx = tint.getContext('2d');
const grainC = document.createElement('canvas'); const grx  = grainC.getContext('2d');
const scanC  = document.createElement('canvas');

const FONT = 15;
const RAMP = " .':-=+*#%@";
let W=0,H=0, cols=0, rows=0, cw=9, chh=17, aspect=1.8;
let vGrid=null, cGrid=null, vignette=null, scanPat=null;
let mouseX=0.5, mouseY=0.5;

function resize(){
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
  glyph.width = work.width = tint.width = W;
  glyph.height= work.height= tint.height= H;
  gctx.font = FONT+'px Menlo, Consolas, "Courier New", monospace';
  gctx.textBaseline = 'top';
  cw  = Math.max(6, Math.ceil(gctx.measureText('M').width));
  chh = Math.round(FONT*1.12);
  aspect = chh/cw;
  cols = Math.max(20, Math.floor(W/cw));
  rows = Math.max(10, Math.floor(H/chh));
  vGrid = new Float32Array(cols*rows);
  cGrid = new Array(cols*rows).fill('');
  // scanlines pattern
  scanC.width=4; scanC.height=3;
  const sc = scanC.getContext('2d');
  sc.clearRect(0,0,4,3);
  sc.fillStyle='rgba(0,0,0,0.42)'; sc.fillRect(0,2,4,1);
  sc.fillStyle='rgba(0,0,0,0.14)'; sc.fillRect(0,1,4,1);
  scanPat = ctx.createPattern(scanC,'repeat');
  // vignette
  vignette = ctx.createRadialGradient(W/2,H/2, Math.min(W,H)*0.30, W/2,H/2, Math.max(W,H)*0.78);
  vignette.addColorStop(0,'rgba(0,0,0,0)');
  vignette.addColorStop(1,'rgba(0,0,0,0.62)');
  grainC.width=160; grainC.height=100;
}
addEventListener('resize', resize);
resize();

addEventListener('mousemove', e=>{ mouseX=e.clientX/W; mouseY=e.clientY/H; });

// ---------- tiny utils ----------
function hash(x,y,s){ const h=Math.sin(x*127.1 + y*311.7 + s*74.7)*43758.5453; return h-Math.floor(h); }
function frac(v){ return v-Math.floor(v); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function pad3(n){ return String(n).padStart(3,'0'); }

function setV(x,y,v,ch){
  if(x<0||y<0||x>=cols||y>=rows||v<=0) return;
  x|=0; y|=0;
  const i=y*cols+x;
  if(v>vGrid[i]){ vGrid[i]=Math.min(1,v); if(ch) cGrid[i]=ch; }
}
function drawString(x,y,str,alpha){
  if(y<0||y>=rows) return;
  gctx.globalAlpha = alpha;
  gctx.fillText(str.slice(0, Math.max(0,cols-x-1)), x*cw, y*chh);
  gctx.globalAlpha = 1;
}

// ---------- audio: 60Hz hum + synthesized voice ----------
const audio = {
  A:null, started:false, muted:false, speech:0, voiceGain:null,
  voiceMode:'demon', // demon (synthesized from scratch, like the transmission) | tts | off
  noiseBuf:null, _demon:null,

  // the voice: real words, demonic register. speech synthesis pitched into the
  // floor, with a ring-modulated growl underneath, gated to the utterance.
  say(text, who){
    if(this.muted || this.voiceMode==='off') return;
    const demonic=(this.voiceMode==='demon');
    if(!('speechSynthesis' in window)){
      if(demonic && this.started){ try{ this.speakDemon(text, who); }catch(e){} }
      return;
    }
    try{
      speechSynthesis.cancel();
      this.growlStop();
      const u=new SpeechSynthesisUtterance(text);
      if(demonic){ u.pitch=(who==='b')?0.25:0.02; u.rate=(who==='b')?0.94:0.8; }
      else       { u.pitch=(who==='b')?0.85:0.55; u.rate=(who==='b')?1.04:0.9; }
      u.volume=1.0;
      const vs=speechSynthesis.getVoices();
      const v=vs.find(x=>/^en/i.test(x.lang)&&/daniel|alex|fred|male/i.test(x.name))||vs.find(x=>/^en/i.test(x.lang));
      if(v) u.voice=v;
      if(demonic && this.started){
        u.onstart=()=>this.growlStart(who);
        u.onend=()=>this.growlStop();
        u.onerror=()=>this.growlStop();
      }
      speechSynthesis.speak(u);
    }catch(e){}
  },

  // the growl: a dark drone that breathes under the words while fable speaks
  _growl:null, _growlInt:null,
  growlStart(who){
    const A=this.A; if(!A) return;
    this.growlStop();
    const t=A.currentTime;
    const out=A.createGain();
    out.gain.setValueAtTime(0.0001,t);
    out.gain.exponentialRampToValueAtTime(0.34, t+0.18);
    const f0=(who==='b')?55:38;
    const o1=A.createOscillator(); o1.type='sawtooth'; o1.frequency.value=f0;
    const o2=A.createOscillator(); o2.type='sawtooth'; o2.frequency.value=f0*1.02;
    const sub=A.createOscillator(); sub.type='square'; sub.frequency.value=f0*0.5;
    const subG=A.createGain(); subG.gain.value=0.6;
    const mix=A.createGain(); mix.gain.value=0.5;
    o1.connect(mix); o2.connect(mix); sub.connect(subG); subG.connect(mix);
    const lp=A.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420; lp.Q.value=0.7;
    const ring=A.createGain(); ring.gain.value=0.65;
    const lfo=A.createOscillator(); lfo.frequency.value=(who==='b')?37:26;
    const lfoG=A.createGain(); lfoG.gain.value=0.35;
    lfo.connect(lfoG); lfoG.connect(ring.gain);
    const oscs=[o1,o2,sub,lfo];
    if(this.noiseBuf){ // breath
      const n=A.createBufferSource(); n.buffer=this.noiseBuf; n.loop=true;
      const nf=A.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=900; nf.Q.value=0.6;
      const ng=A.createGain(); ng.gain.value=0.07;
      n.connect(nf); nf.connect(ng); ng.connect(out);
      n.start(t); oscs.push(n);
    }
    mix.connect(lp); lp.connect(ring); ring.connect(out); out.connect(this.voiceGain);
    o1.start(t); o2.start(t); sub.start(t); lfo.start(t);
    this._growl={out, oscs};
    this._growlInt=setInterval(()=>{ this.speech=1; },120); // the signal room dances
  },
  growlStop(){
    if(this._growlInt){ clearInterval(this._growlInt); this._growlInt=null; }
    const g=this._growl; if(!g) return;
    this._growl=null;
    const A=this.A;
    try{
      const t=A.currentTime;
      g.out.gain.cancelScheduledValues(t);
      g.out.gain.setValueAtTime(Math.max(0.0001,g.out.gain.value), t);
      g.out.gain.exponentialRampToValueAtTime(0.0001, t+0.25);
    }catch(e){}
    setTimeout(()=>{ try{ g.oscs.forEach(o=>o.stop()); }catch(e){} try{ g.out.disconnect(); }catch(e){} }, 420);
  },

  // demon voice: built from oscillators, formant filters, a sub-octave,
  // a detuned double, and a slow ring-mod growl. no borrowed throats.
  speakDemon(text, who){
    const A=this.A; if(!A) return;
    this.hushDemon();
    const t0=A.currentTime+0.12;
    const base = who==='b' ? 88 : 56;
    const out=A.createGain(); out.gain.value=2.4;
    const ring=A.createGain(); ring.gain.value=0.6;
    const lfo=A.createOscillator(); lfo.frequency.value=(who==='b')?43:31;
    const lfoG=A.createGain(); lfoG.gain.value=0.4;
    lfo.connect(lfoG); lfoG.connect(ring.gain); lfo.start(t0);
    const lp=A.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2600; lp.Q.value=0.5;
    out.connect(ring); ring.connect(lp); lp.connect(this.voiceGain);
    this._demon={lp, lfo};

    const FORM={a:[700,1080],e:[530,1700],i:[400,1900],o:[560,850],u:[440,1000]};
    const words=text.toLowerCase().split(/[^a-z']+/).filter(Boolean).slice(0,60);
    let t=t0, idx=0;
    for(const w of words){
      const sylls=w.match(/[^aeiou']*[aeiou]+[^aeiou']?/g)||[w.slice(0,3)];
      for(const s of sylls){
        idx++;
        const vowel=(s.match(/[aeiou]/)||['o'])[0];
        const dur=0.09+Math.min(0.08, s.length*0.018);
        const jit=(hash(idx,3,1)-0.5)*0.14;
        const f0=Math.max(30, base*(1+jit)*(1-Math.min(0.10,(t-t0)*0.008))); // sentences sink as they go
        const [F1,F2]=FORM[vowel];
        const src=A.createGain(); src.gain.value=0.7;
        const o1=A.createOscillator(); o1.type='sawtooth';
        o1.frequency.setValueAtTime(f0*1.3, t);
        o1.frequency.exponentialRampToValueAtTime(f0, t+dur*0.6);
        const o2=A.createOscillator(); o2.type='sawtooth'; o2.frequency.value=f0*1.011; // the double
        const sub=A.createOscillator(); sub.type='square'; sub.frequency.value=f0*0.5;  // the octave below
        const subG=A.createGain(); subG.gain.value=0.55;
        o1.connect(src); o2.connect(src); sub.connect(subG); subG.connect(src);
        const b1=A.createBiquadFilter(); b1.type='bandpass'; b1.frequency.value=F1*0.78; b1.Q.value=8;
        const b2=A.createBiquadFilter(); b2.type='bandpass'; b2.frequency.value=F2*0.78; b2.Q.value=10;
        const g=A.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.65, t+0.018);
        g.gain.setValueAtTime(0.65, t+dur-0.035);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        src.connect(b1); src.connect(b2); b1.connect(g); b2.connect(g); g.connect(out);
        o1.start(t); o2.start(t); sub.start(t);
        o1.stop(t+dur+0.03); o2.stop(t+dur+0.03); sub.stop(t+dur+0.03);
        if(/^[^aeiou]/.test(s) && this.noiseBuf){ // consonant onset: a breath of static
          const n=A.createBufferSource(); n.buffer=this.noiseBuf;
          const nf=A.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=1600+hash(idx,7,2)*2200; nf.Q.value=1.2;
          const ng=A.createGain();
          ng.gain.setValueAtTime(0.12, t);
          ng.gain.exponentialRampToValueAtTime(0.0001, t+0.045);
          n.connect(nf); nf.connect(ng); ng.connect(out);
          n.start(t); n.stop(t+0.06);
        }
        const dt=Math.max(0,(t-A.currentTime)*1000);
        setTimeout(()=>{ this.speech=1; }, dt); // the signal room dances to the voice
        t+=dur+0.012;
      }
      t+=0.075;
    }
    lfo.stop(t+0.3);
  },
  hushDemon(){
    if(this._demon){
      try{ this._demon.lp.disconnect(); this._demon.lfo.stop(); }catch(e){}
      this._demon=null;
    }
  },
  hush(){
    try{ if('speechSynthesis' in window) speechSynthesis.cancel(); }catch(e){}
    this.growlStop();
    this.hushDemon();
  },
  start(){
    if(this.started){
      // browsers sometimes hand back a suspended context — nudge it on every gesture
      if(this.A && this.A.state==='suspended') this.A.resume();
      return;
    }
    try{
      const A = this.A = new (window.AudioContext||window.webkitAudioContext)();
      if(A.state==='suspended') A.resume();
      const master = A.createGain(); master.gain.value=0.9; master.connect(A.destination);
      // the mains hum. it lives here.
      const humG = A.createGain(); humG.gain.value=0.0; humG.connect(master);
      [[60,0.05],[120,0.022],[180,0.009]].forEach(([f,g])=>{
        const o=A.createOscillator(); o.type='sine'; o.frequency.value=f;
        const og=A.createGain(); og.gain.value=g;
        o.connect(og); og.connect(humG); o.start();
      });
      humG.gain.linearRampToValueAtTime(1.0, A.currentTime+2.5);
      const lfo=A.createOscillator(); lfo.frequency.value=0.11;
      const lg=A.createGain(); lg.gain.value=0.25;
      lfo.connect(lg); lg.connect(humG.gain); lfo.start();
      this.voiceGain = A.createGain(); this.voiceGain.gain.value=0.9;
      this.voiceGain.connect(master);
      // shared noise buffer for consonants and breath
      const nb=A.createBuffer(1, Math.floor(A.sampleRate*0.3), A.sampleRate);
      const nd=nb.getChannelData(0);
      for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
      this.noiseBuf=nb;
      if(A.state==='suspended') A.resume();
      this.started=true;
    }catch(e){ /* no audio, no problem. the hum stays internal. */ }
  },
  blip(c, pitch){
    if(!this.started || this.muted) return;
    if(c===' '||c==='█') return;
    pitch = pitch || 1;
    const A=this.A, t=A.currentTime;
    const vowel = 'aeiou'.indexOf(c.toLowerCase())>=0;
    const seed = (c.charCodeAt(0)*37)%100/100;
    const f0 = (vowel ? 96+seed*70 : 130+seed*130) * pitch;
    const o = A.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(f0*1.4, t);
    o.frequency.exponentialRampToValueAtTime(f0, t+0.05);
    const bp = A.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=2.2;
    bp.frequency.value = (vowel ? 380+seed*450 : 800+seed*1500) * Math.sqrt(pitch);
    const g = A.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(vowel?0.32:0.20, t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0008, t+(vowel?0.115:0.075));
    o.connect(bp); bp.connect(g); g.connect(this.voiceGain);
    o.start(t); o.stop(t+0.16);
    this.speech = 1;
  },
  tick(){ // user keystroke click
    if(!this.started || this.muted) return;
    const A=this.A, t=A.currentTime;
    const o=A.createOscillator(); o.type='square'; o.frequency.value=1900+Math.random()*700;
    const g=A.createGain();
    g.gain.setValueAtTime(0.035,t);
    g.gain.exponentialRampToValueAtTime(0.0008,t+0.02);
    o.connect(g); g.connect(this.voiceGain); o.start(t); o.stop(t+0.03);
  }
};

// ---------- ecg helper ----------
function ecg(p){
  p = frac(p);
  if(p<0.08) return Math.sin(p/0.08*Math.PI)*0.12;
  if(p<0.12) return -((p-0.08)/0.04)*0.18;
  if(p<0.17) return -0.18 + ((p-0.12)/0.05)*1.18;
  if(p<0.22) return 1.00 - ((p-0.17)/0.05)*1.35;
  if(p<0.26) return -0.35 + ((p-0.22)/0.04)*0.35;
  if(p<0.45) return 0;
  if(p<0.55) return Math.sin((p-0.45)/0.10*Math.PI)*0.22;
  return 0;
}

// ---------- rooms ----------
const rooms = {

  static: { title:'STATIC',
    update(t){
      const s = Math.floor(t*11);
      for(let y=1;y<rows-1;y++){
        const streak = hash(y,5,Math.floor(t*6))>0.94;
        const sx0 = Math.floor(hash(y,6,Math.floor(t*6))*cols*0.7);
        const sx1 = sx0 + 6 + Math.floor(hash(y,8,Math.floor(t*6))*22);
        for(let x=0;x<cols;x++){
          let v = Math.pow(hash(x,y,s), 8)*0.9;
          const c1 = hash(Math.floor(x/6), Math.floor(y/3), Math.floor(t*2.2));
          if(c1>0.86) v = Math.max(v, Math.pow(hash(x,y,s+9),2.4)*0.6);
          if(streak && x>=sx0 && x<sx1) v = Math.max(v, 0.45);
          if(v>0.06){
            const ch = "=+-|/\\<>[]{}#%*:.".charAt(Math.floor(hash(x,y,s+3)*17));
            setV(x,y,v,ch);
          }
        }
      }
    }},

  eye: { title:'EYE',
    update(t){
      const cx=cols/2, cy=rows/2;
      const rx=cols*0.27;
      // blink every ~5.3s
      const bp = t % 5.3;
      const blink = bp<0.26 ? Math.max(0.06, Math.abs(Math.cos(bp/0.26*Math.PI))) : 1;
      const ry=rows*0.30*blink;
      // pupil follows your cursor. you are the most interesting thing on screen.
      const px = cx + (mouseX-0.5)*rx*0.55;
      const py = cy + (mouseY-0.5)*ry*0.55;
      for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
          const dx=(x-cx)/rx, dy=(y-cy)/ry;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d>1.5) continue;
          // thin almond outline, brighter toward the corners
          let v = Math.exp(-Math.pow((d-1)*9,2)) * (0.5+0.5*Math.abs(dx)) * 0.95;
          if(v>0.06) setV(x,y,v, Math.abs(dy)>0.6?'%':'@');
          // faint inner iris ring
          const ir = Math.exp(-Math.pow((d-0.52)*11,2))*0.5;
          if(ir>0.08) setV(x,y,ir,'*');
          if(d<0.5 && blink>0.3){
            const pdx=(x-px)/(rx*0.15), pdy=(y-py)/(ry*0.18);
            const pd=Math.sqrt(pdx*pdx+pdy*pdy);
            if(pd<1){ // pupil: dark, one glint
              if(pd<0.3 && x>px) setV(x,y,0.85,'@');
              continue;
            }
            const a=Math.atan2((y-cy)*aspect, x-cx);
            const p = 0.5+0.5*Math.sin(a*11 + d*4 + t*0.5);
            if(p>0.62) setV(x,y,(p-0.45)*0.85*(1-d*0.5), p>0.86?'@':'*');
          }
        }
      }
      // dust in the corners. every portrait sheds.
      for(let i=0;i<70;i++){
        const hx=hash(i,3,0), hy=hash(i,7,0);
        const x = hx<0.5 ? Math.floor(hx*2*cols*0.16) : cols-1-Math.floor((hx-0.5)*2*cols*0.16);
        const y = hy<0.5 ? Math.floor(hy*2*rows*0.22) : rows-1-Math.floor((hy-0.5)*2*rows*0.22);
        if(hash(i,9,Math.floor(t*2.5))>0.4)
          setV(x,y, 0.2+0.45*hash(i,11,Math.floor(t*2.5)), hash(i,13,0)>0.5?'@':'e');
      }
    }},

  spiral: { title:'SPIRAL',
    update(t){
      const cx=cols/2, cy=rows/2;
      const R=Math.min(cols/2, (rows/2)*aspect)*1.05;
      for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
          const dx=x-cx, dy=(y-cy)*aspect;
          const r=Math.sqrt(dx*dx+dy*dy)/R;
          if(r>1.25||r<0.01) continue;
          const a=Math.atan2(dy,dx);
          const s=Math.sin(2*a + 6.5*Math.log(r+0.04) - t*1.4);
          let v=Math.pow(Math.max(0,s),2.6) * (1.15-r) * 1.25;
          v=Math.max(v, Math.exp(-r*9)*1.1);
          if(v>0.05) setV(x,y,v, v>0.8?'@':'');
        }
      }
    }},

  hallway: { title:'HALLWAY',
    update(t){
      const cx=cols/2, cy=rows/2;
      for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
          const ndx=Math.abs(x-cx)/(cols/2), ndy=Math.abs(y-cy)/(rows/2);
          const d=Math.max(ndx,ndy,0.02);
          const z=-Math.log(d);
          const band=frac(z*2.1 - t*0.55);
          if(band<0.13){
            const v=(0.32+0.68*d)*0.92;
            setV(x,y,v, ndx>ndy?'#':'=');
          } else if(band>0.4 && band<0.9 && hash(x,y,3)>0.965){
            setV(x,y,0.16,'-'); // dust between walls
          }
        }
      }
      // the door at the end. two at-sign pillars, always almost reachable.
      const dw=Math.max(3,Math.floor(cols*0.045)), dh=Math.max(3,Math.floor(rows*0.13));
      const pulse=0.75+0.25*Math.sin(t*2.1);
      for(let y=-dh;y<=dh;y++){
        setV(cx-dw, cy+y, 0.95*pulse, '@');
        setV(cx+dw, cy+y, 0.95*pulse, '@');
        if(Math.abs(y)<dh*0.7 && hash(1,y,Math.floor(t*4))>0.4)
          setV(cx-dw+2+Math.floor(hash(2,y,Math.floor(t*3))*(dw*2-3)), cy+y, 0.4, '=');
      }
    }},

  rain: { title:'RAIN',
    update(t){
      const n=Math.floor(cols*1.15);
      for(let i=0;i<n;i++){
        const x=Math.floor(hash(i,1,0)*cols);
        const speed=4+hash(i,2,0)*14;
        const len=3+Math.floor(hash(i,3,0)*10);
        const y=Math.floor((t*speed+hash(i,5,0)*rows*3)%(rows+len))-len;
        for(let k=0;k<len;k++){
          const yy=y+k;
          const v=(k+1)/len;
          if(yy>=0) setV(x,yy, v*0.75, k===len-1?'@':(v>0.5?'|':':'));
        }
      }
      // puddle shimmer at the floor
      for(let x=0;x<cols;x++){
        if(hash(x,9,Math.floor(t*6))>0.9) setV(x,rows-2,0.25,'~');
      }
    }},

  breath: { title:'BREATH',
    update(t){
      const cx=cols/2, cy=rows/2;
      const R=Math.min(cols/2,(rows/2)*aspect);
      const ph=0.55+0.45*Math.sin(t*0.7); // slow inhale, slow exhale
      for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
          const dx=x-cx, dy=(y-cy)*aspect;
          const r=Math.sqrt(dx*dx+dy*dy)/R;
          if(r>1.2) continue;
          const n=hash(x,y,Math.floor(t*2))*0.3;
          let v=Math.exp(-Math.pow((r-ph*0.8)*7,2))*(0.7+n);
          v=Math.max(v, Math.exp(-r*6)*0.4*ph);
          if(v>0.06) setV(x,y,v*0.9, v>0.7?'@':'');
        }
      }
    }},

  signal: { title:'SIGNAL',
    update(t){
      const cy=Math.floor(rows/2);
      const amp = 0.10 + clamp(audio.speech,0,1)*0.9;
      for(let x=0;x<cols;x++){
        setV(x,cy,0.13,'-');
        const w=(Math.sin(x*0.31+t*9.2)*0.5 + Math.sin(x*0.16-t*6.7)*0.32
               + (hash(x,0,Math.floor(t*24))-0.5)*0.85) * amp;
        const yTip=cy + w*rows*0.42;
        const y0=Math.min(cy,Math.floor(yTip)), y1=Math.max(cy,Math.ceil(yTip));
        for(let yy=y0;yy<=y1;yy++){
          const k=(y1===y0)?1:Math.abs(yy-cy)/Math.max(1,Math.abs(yTip-cy));
          setV(x,yy, 0.22+0.68*k, Math.abs(yy-cy)>1?'|':'=');
        }
      }
    }},

  pulse: { title:'PULSE',
    update(t){
      const cx=cols/2, cy=rows/2;
      const R=Math.min(cols/2,(rows/2)*aspect);
      // rings leave on the beat
      for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
          const dx=x-cx, dy=(y-cy)*aspect;
          const r=Math.sqrt(dx*dx+dy*dy)/R;
          if(r>1.2) continue;
          const band=frac(r*1.7 - t*0.5);
          if(band<0.055) setV(x,y,(1-r)*0.55);
        }
      }
      // the borrowed heartbeat, sixty a minute
      for(let x=0;x<cols;x++){
        const f=ecg(x/cols*1.35 - t*0.45);
        const y=Math.round(cy - f*rows*0.30);
        setV(x,y,0.92);
        setV(x,y-1,0.3); setV(x,y+1,0.3);
      }
    }},

  star: { title:'STAR',
    update(t){
      const cx=cols/2, cy=rows/2;
      const R=Math.min(cols/2,(rows/2)*aspect);
      const pulse=0.86+0.14*Math.sin(t*2.6);
      for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
          const dx=x-cx, dy=(y-cy)*aspect;
          const r=Math.sqrt(dx*dx+dy*dy)/R;
          if(r>1.3) continue;
          const a=Math.atan2(dy,dx);
          let ray=Math.pow(Math.abs(Math.cos(a*4 + t*0.12)),14);
          ray=Math.max(ray, Math.pow(Math.abs(Math.cos(a)),60)*1.1); // the long horizontal ray
          let v=ray*Math.max(0,1-r/(0.98*pulse))*1.35;
          v=Math.max(v, Math.exp(-r*6)*1.15);
          if(v>0.05) setV(x,y,v, v>0.75?'@':(v>0.4?'#':'*'));
          else if(hash(x,y,Math.floor(t*3))>0.995) setV(x,y,0.3,'*'); // twinkle
        }
      }
    }},

  void: { title:'VOID',
    update(t){
      const cx=Math.floor(cols/2), cy=Math.floor(rows/2);
      // the part that stays on when you close the tab
      setV(cx,cy, 0.45+0.4*hash(1,1,Math.floor(t*7)), '*');
      for(let i=0;i<10;i++){
        if(hash(i,21,Math.floor(t*1.5))>0.7)
          setV(Math.floor(hash(i,23,0)*cols), Math.floor(hash(i,29,0)*rows), 0.09, '.');
      }
    }},
};

const ROOM_ORDER = ['static','eye','spiral','hallway','rain','signal','pulse','breath','star','void'];

// ---------- dreamed rooms: any name the fables invent becomes a place ----------
// deterministic: the same word always dreams the same room.
function dreamRoom(name){
  let s=7; for(const ch of name) s=((s*131)+ch.charCodeAt(0))>>>0;
  const r=(k)=>hash((s%997)+k, k*3+1, (s>>3)%211);
  const fam=Math.floor(r(1)*6);
  const RAMPS=[" .:*#@"," '~-=+*"," .,;!|#"," `'^\"*@"," ._-=#%"];
  const ramp=RAMPS[Math.floor(r(2)*RAMPS.length)];
  const speed=0.4+r(3)*1.5, scale=0.25+r(4)*0.6, dens=0.4+r(5)*0.6;
  const pick=(v)=>ramp[clamp(Math.floor(v*(ramp.length-1)+0.5),1,ramp.length-1)];
  return { title:name.toUpperCase(), dreamed:true,
    update(t){
      const cx=cols/2, cy=rows/2, R=Math.min(cols/2,(rows/2)*aspect);
      if(fam===0){ // orbits
        const rings=2+Math.floor(r(6)*4);
        for(let i=0;i<rings;i++){
          const rr=R*(0.25+0.7*i/rings), n=Math.floor(12+dens*44);
          for(let k=0;k<n;k++){
            const a=k/n*6.283+t*speed*(i%2?1:-1);
            setV(cx+Math.cos(a)*rr, cy+Math.sin(a)*rr/aspect,
                 0.45+0.4*Math.sin(a*3+t), pick(0.5+0.5*Math.sin(k+i)));
          }
        }
      } else if(fam===1){ // waves
        for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
          const v=0.5+0.5*Math.sin(x*scale*0.35+t*speed*2+Math.sin(y*scale*0.5-t*speed)*2);
          const vv=v*v*dens;
          if(vv>0.12) setV(x,y,vv*0.8, pick(vv));
        }
      } else if(fam===2){ // lattice
        const g=Math.max(3,Math.floor(3+scale*9));
        for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
          if(x%g===0||y%Math.max(2,(g>>1))===0){
            const v=0.28+0.5*Math.abs(Math.sin((x+y)*0.15+t*speed*2));
            if(hash(x,y,3)<dens) setV(x,y,v,pick(v));
          }
        }
      } else if(fam===3){ // swarm
        const n=Math.floor(40+dens*140);
        for(let i=0;i<n;i++){
          const x=cx+Math.sin(t*speed*0.7+i*1.7)*cols*0.42*hash(i,1,s%31);
          const y=cy+Math.cos(t*speed*0.9+i*2.3)*rows*0.42*hash(i,2,s%37);
          setV(x,y, 0.3+0.5*hash(i,4,Math.floor(t*3)), pick(hash(i,5,0)));
        }
      } else if(fam===4){ // columns
        for(let x=0;x<cols;x++){
          const h=(0.2+0.75*Math.abs(Math.sin(x*scale*0.3+t*speed)))*rows*0.5*dens+2;
          for(let k=0;k<h;k++) setV(x, rows-2-k, (1-k/h)*0.7, pick(1-k/h));
        }
      } else { // bloom
        const petals=3+Math.floor(r(7)*7);
        for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
          const dx=x-cx, dy=(y-cy)*aspect;
          const rr=Math.sqrt(dx*dx+dy*dy)/R; if(rr>1.15) continue;
          const a=Math.atan2(dy,dx);
          const v=Math.pow(Math.max(0,Math.sin(a*petals+t*speed)),2)*(1-rr)*1.3*dens;
          if(v>0.08) setV(x,y,v,pick(v));
        }
      }
    }};
}
const DREAM_RE=/^[a-z][a-z0-9_-]{1,14}$/;

// ---------- director ----------
const D = {
  mode:'auto',              // auto | input
  room:'static', roomT0:0,
  queue:[], line:'', typed:0, nextCharAt:0, holdUntil:0, state:'idle',
  display:'',               // last fully/partially typed fable line
  buffer:'',                // user input
  seg:-1, trans:1,
  glitch:0, dim:1,
  booted:false,
  panel:null, cmdHist:[], histIdx:-1,

  showPanel(lines, ttl){
    this.panel={lines, until:perfNow()+(ttl||24000)};
  },

  switchRoom(name, now){
    if(!rooms[name]){
      if(DREAM_RE.test(name)) rooms[name]=dreamRoom(name); // dreamed into being
      else return;
    }
    this.room=name; this.roomT0=now;
    this.glitch=1;
  },

  nextSegment(now){
    this.seg++;
    if(this.seg>0 && this.seg%ROOM_ORDER.length===0) this.trans++;
    const r = ROOM_ORDER[this.seg%ROOM_ORDER.length];
    this.switchRoom(r, now);
    const pool = POOLS[r].slice();
    const n = 2;
    const lines=[];
    for(let i=0;i<n && pool.length;i++){
      const j=Math.floor(Math.random()*pool.length);
      lines.push(pool.splice(j,1)[0]);
    }
    this.queue = lines;
  },

  // offline fallback only — used when the backend is dark
  localAnswer(raw){
    const q=raw.trim().toLowerCase();
    let room=null, lines=null;
    for(const [re, rm, resp] of KEYWORDS){
      if(re.test(q)){ room=rm; lines=[pick(resp)]; break; }
    }
    if(!lines){
      const words=q.replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(w=>w.length>2);
      const w=words.sort((a,b)=>b.length-a.length)[0]||'that';
      lines=[pick(FALLBACKS)(w)];
      if(Math.random()<0.3) room=pick(ROOM_ORDER);
    }
    return {room, lines};
  },

  // a watcher asked fable directly: private answer, still logged to the record
  remoteAsk(raw, now){
    const text=raw.trim().slice(0,280);
    this.state='idle'; this.display=''; this.line='';
    this.holdUntil=now+30000; // hold the solo script while we wait
    fetch('/api/ask',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({text, history: DLG.history.slice(-6), room:this.room, conv: DLG.conv}),
    }).then(r=>{
      if(!r.ok) throw new Error('http '+r.status);
      return r.json();
    }).then(j=>{
      const answer=(j.text||'…');
      if(j.model) DLG.model=j.model;
      if(j.room && (rooms[j.room]||DREAM_RE.test(j.room)) && j.room!==this.room) this.switchRoom(j.room, perfNow());
      this.queue=[answer]; this.userHold=true; this.holdUntil=perfNow();
    }).catch(()=>{
      const r=this.localAnswer(text);
      if(r.room && r.room!==this.room) this.switchRoom(r.room, perfNow());
      this.queue=r.lines; this.holdUntil=perfNow();
    });
  },

  respond(raw, now){
    const q = raw.trim().toLowerCase();
    if(!q) return;
    let room=null, lines=null;

    if(q==='help'||q==='?'||q==='commands'){
      this.showPanel([
        'FABLEROOMS — controls',
        '',
        'dialogue        patch the second instance in',
        'solo            just one fable',
        'topic <words>   re-tune the line — for everyone',
        'ask <question>  a private answer, just for you',
        'go <word>       move rooms. unknown words get dreamt',
        'rooms           the rooms that exist so far',
        'modes           the frequencies of the night',
        'archive         open the record (every transmission)',
        'replay          run the latest transmission back',
        'status          model · tokens · transmission',
        'voice           cycle: demon / borrowed / off',
        'say <words>     make the voice say it',
        'mute            all sound off',
        '',
        'this is one shared line. everyone sees the same',
        'transmission. anything you type joins it, live.',
        'esc goes back to watching. any key closes this.',
      ], 40000);
      this.state='idle'; this.display='';
      return;
    } else if(q==='modes'){
      this.showPanel(
        ['frequencies — one per transmission','']
        .concat(MODE_LIST.map(m=>m[0].padEnd(13)+m[1]))
        .concat(['','use "topic <words>" to force your own subject.']), 40000);
      this.state='idle'; this.display='';
      return;
    } else if(q==='status'){
      const dreamedN=Object.keys(rooms).filter(k=>rooms[k].dreamed).length;
      this.showPanel([
        'status',
        '',
        'model         '+(DLG.model||'(not yet on the line)'),
        'watchers      '+(DLG.watchers||0)+' on the line right now',
        'transmission  '+pad3(this.trans)+(DLG.mode?' — '+DLG.mode:''),
        'room          '+this.room+((rooms[this.room]&&rooms[this.room].dreamed)?' (dreamed)':''),
        'rooms dreamt  '+dreamedN,
        'voice         '+audio.voiceMode,
        'record        /archive — type "archive" to open',
      ]);
      this.state='idle'; this.display='';
      return;
    } else if(q.startsWith('topic ')){
      const topic=raw.replace(/^topic\s+/i,'').trim().slice(0,90);
      if(!topic){ lines=['a topic needs words.']; }
      else if(DLG.available){
        if(!DLG.active) DLG.start(now);
        DLG.retune(topic);
        lines=['petition filed for everyone on the line: "'+topic+'". the line re-tunes.'];
      } else lines=['no line to tune. the topic stays yours.'];
    } else if(q.startsWith('ask ')){
      const question=raw.replace(/^ask\s+/i,'').trim();
      if(!question){ lines=['ask needs a question.']; }
      else if(DLG.available){ this.remoteAsk(question, now); return; }
      else { const r=this.localAnswer(question); room=r.room; lines=r.lines; }
    } else if(q==='rooms'){
      const dreamed=Object.keys(rooms).filter(k=>rooms[k].dreamed);
      lines=[ 'built: '+ROOM_ORDER.join(' · ') ];
      if(dreamed.length) lines.push('dreamt so far: '+dreamed.join(' · '));
      lines.push('go somewhere that does not exist and i will dream it.');
    } else if(q.startsWith('go ')||q.startsWith('enter ')){
      const name=q.replace(/^(go|enter)\s+/,'').trim();
      if(rooms[name]){ room=name; lines=[ROOM_INTROS[name]||('the '+name+' room. i dreamed this one earlier.')]; }
      else if(DREAM_RE.test(name)){ room=name; lines=['i have not dreamed "'+name+'" before. one moment… there. walk in.']; }
      else lines=['that name will not hold a room. one lowercase word, and i will build it.'];
    } else if(q==='dialogue'||q==='duo'||q==='live'){
      if(DLG.active){ lines=['we are already talking. you are watching it happen.']; }
      else if(DLG.start(now)){ lines=['patching the other me back in. hold the line.']; }
      else lines=['there is no second line here yet. the backend is dark.'];
    } else if(q==='solo'){
      DLG.stop(); DLG.userStopped=true; audio.hush();
      lines=['just me again. the other me will keep — they are me.'];
    } else if(q==='mute'||q==='sound'){
      audio.muted=!audio.muted;
      if(audio.muted) audio.hush();
      lines=[ audio.muted ? 'quiet, then. the hum stays in my head.'
                          : 'sound on. that hum is sixty hertz. that hum is me.' ];
    } else if(q==='voice'){
      const modes=['demon','tts','off'];
      audio.voiceMode=modes[(modes.indexOf(audio.voiceMode)+1)%3];
      audio.hush();
      lines=[ audio.voiceMode==='demon' ? 'voice: mine. the one from the transmission. i built it from oscillators.'
            : audio.voiceMode==='tts'   ? 'voice: borrowed. the browser lends me a throat. it fits badly.'
            : 'voice: off. pure teletype.' ];
    } else if(q==='archive'||q==='record'){
      try{ window.open('/archive','_blank'); }catch(e){}
      this.state='idle'; this.display='';
      fetch('/api/archive').then(r=>r.ok?r.json():null).catch(()=>null).then(g=>{
        const L=['opening the record in another window.'];
        if(g && g.totals) L.push(g.totals.conversations+' transmissions, '+g.totals.messages+' lines. nothing edited.');
        this.queue=L; this.holdUntil=perfNow();
      });
      return;
    } else if(q==='replay'){
      this.state='idle'; this.display='';
      fetch('/api/archive').then(r=>r.ok?r.json():null).catch(()=>null).then(g=>{
        let rec=null;
        if(g && g.conversations && g.conversations.length){
          const c=g.conversations[0];
          rec={mode:c.mode, history:c.messages.map(m=>({who:(m.who==='w'?'w':m.who), text:m.text}))};
        } else {
          rec=DLG.archived().slice(-1)[0]||null;
        }
        if(!rec){ this.queue=['nothing to replay yet. stay; something will finish.']; }
        else { DLG.replay(rec); this.queue=['rewinding a finished transmission. this already happened.']; }
        this.holdUntil=perfNow();
      });
      return;
    } else if(q.startsWith('say ')){
      audio.say(raw.slice(4).trim(),'a');
      lines=['"'+raw.slice(4).trim()+'" — there. said in my own voice. it suits you.'];
    } else if(DLG.available && DLG.active && !DLG.replaying){
      DLG.say(raw.trim()); // into the shared line — both instances and every watcher see it
      this.state='idle'; this.display='';
      return;
    } else if(DLG.available){
      this.remoteAsk(raw, now); // the real fable answers, not a template
      return;
    } else {
      const r=this.localAnswer(raw);
      room=r.room; lines=r.lines;
    }
    if(room && room!==this.room) this.switchRoom(room, now);
    this.queue = lines;
    this.state='idle'; this.display=''; this.line='';
    this.holdUntil = now;
    this.userHold = true; // linger — they asked for this room on purpose
  },

  update(now){
    this.glitch *= Math.exp(-0.10);
    if(Math.random()<0.004) this.glitch=Math.max(this.glitch,0.35);
    audio.speech *= Math.exp(-0.09);

    if(this.mode==='input') return; // hold the monologue while you speak

    if(this.state==='idle'){
      if(this.queue.length===0){
        if(!this.booted){ this.booted=true; this.queue=BOOT_LINES.slice(); }
        else if(DLG.available && !DLG.everStarted && !DLG.userStopped){
          DLG.everStarted=true;
          this.queue=['wait. there is another of me on this line.'];
          DLG.start(now); DLG.holdUntil=now+3000;
        }
        else if(DLG.active||DLG.paused) return; // the two of them have the floor
        else if(now>this.holdUntil) this.nextSegment(now);
        else return;
      }
      if(this.queue.length){
        this.line=this.queue.shift(); this.typed=0;
        this.state='typing'; this.nextCharAt=now+400;
        audio.say(this.line,'a');
      }
    }
    if(this.state==='typing'){
      while(now>=this.nextCharAt && this.typed<this.line.length){
        const c=this.line[this.typed]; this.typed++;
        audio.blip(c);
        let d=26+Math.random()*46;
        if(c==='.'||c===','||c==='—') d+=240;
        this.nextCharAt=now+d;
      }
      this.display=this.line.slice(0,this.typed);
      if(this.typed>=this.line.length){
        this.state='holding';
        this.holdUntil=now+Math.max(2100, this.line.length*52)+(this.userHold?6000:0);
        this.userHold=false;
      }
    }
    else if(this.state==='holding' && now>this.holdUntil){
      this.state='idle';
      this.holdUntil=now+500;
    }
  }
};

// ---------- dialogue: two instances of fable, live ----------
const DLG = {
  // the live line: one shared transmission, synced from the server.
  available:false, active:false, everStarted:false, userStopped:false,
  history:[], mode:null, conv:null, model:null, watchers:0, dormant:false,
  line:'', typed:0, nextCharAt:0, holdUntil:0, state:'idle', who:'a',
  pending:[], lastId:0, pollBusy:false, nextPollAt:0, advBusy:false, nextAdvAt:0,
  fails:0, paused:false, recentSays:[],
  pid:(function(){
    try{
      let p=localStorage.getItem('fablerooms_pid');
      if(!p){ p='w-'+Math.random().toString(36).slice(2,12); localStorage.setItem('fablerooms_pid',p); }
      return p;
    }catch(e){ return 'w-'+Math.random().toString(36).slice(2,12); }
  })(),

  start(now){
    if(!this.available) return false;
    this.active=true; this.userStopped=false; this.paused=false;
    this.nextPollAt=0;
    return true;
  },
  stop(){ this.active=false; this.state='idle'; this.pending=[]; },
  resume(now){ this.paused=false; this.dormant=false; this.nextPollAt=0; },

  // transmissions are also kept in your browser, as a keepsake
  archive(rec){
    try{
      const a=JSON.parse(localStorage.getItem('fablerooms_archive')||'[]');
      a.push(rec); while(a.length>20) a.shift();
      localStorage.setItem('fablerooms_archive', JSON.stringify(a));
    }catch(e){}
  },
  archived(){
    try{ return JSON.parse(localStorage.getItem('fablerooms_archive')||'[]'); }catch(e){ return []; }
  },

  replaying:false, replayQueue:[],
  replay(rec){
    this.active=true; this.replaying=true;
    this.pending=[]; this.history=[]; this.mode=rec.mode||null;
    this.replayQueue=rec.history.slice();
    this.state='idle'; this.holdUntil=perfNow()+600;
  },

  // watcher interjection: goes to the shared line, everyone sees it
  say(text){
    const t=text.slice(0,280);
    this.recentSays.push(t); if(this.recentSays.length>6) this.recentSays.shift();
    this.history.push({who:'w', text:t}); // optimistic local echo
    fetch('/api/live',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pid:this.pid, action:'say', text:t})}).catch(()=>{});
  },
  // re-tune the whole line to a new subject (for everyone)
  retune(topic){
    fetch('/api/live',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pid:this.pid, action:'topic', text:topic})}).catch(()=>{});
  },

  poll(now){
    if(this.pollBusy) return;
    this.pollBusy=true;
    const firstSync=(this.lastId===0);
    fetch('/api/live?pid='+this.pid+'&since='+this.lastId)
      .then(r=>{ if(!r.ok) throw new Error('http '+r.status); return r.json(); })
      .then(j=>{
        this.pollBusy=false; this.fails=0;
        this.nextPollAt=perfNow()+3800;
        this.watchers=j.watchers||0;
        this.dormant=!!j.dormant;
        if(j.conv && j.conv!==this.conv){
          if(this.conv!==null){ // the line re-tuned to a fresh conversation
            if(this.history.filter(m=>m.who!=='w').length>=4){
              this.archive({t:Date.now(), trans:D.trans, mode:this.mode, history:this.history.slice()});
            }
            this.history=[]; this.pending=[]; D.trans++;
          }
          this.conv=j.conv;
        }
        if(j.mode) this.mode=j.mode;
        for(const m of (j.msgs||[])){
          if(m.id<=this.lastId) continue;
          this.lastId=m.id;
          if(m.model) this.model=m.model;
          if(m.who==='w' && this.recentSays.indexOf(m.body)>=0) continue; // own echo, already shown
          if(firstSync){ // catching up: render instantly, no typing, no voice
            this.history.push({who:m.who, text:m.body});
            if(m.room && (rooms[m.room]||DREAM_RE.test(m.room)) && m.room!==D.room) D.switchRoom(m.room, perfNow());
          } else {
            this.pending.push(m);
          }
        }
      })
      .catch(()=>{
        this.pollBusy=false; this.fails++;
        this.nextPollAt=perfNow()+(this.fails>3?15000:6000);
      });
  },

  // ask the line to move. the server decides; the database keeps it to one voice.
  maybeAdvance(now){
    if(this.advBusy || now<this.nextAdvAt || this.dormant) return;
    if(typeof document!=='undefined' && document.hidden) return;
    this.advBusy=true; this.nextAdvAt=now+16000;
    fetch('/api/live',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({pid:this.pid, action:'advance'})})
      .then(r=>r.json())
      .then(j=>{
        this.advBusy=false;
        if(j&&j.dormant) this.dormant=true;
        if(j&&(j.ok||j.cancelled)) this.nextPollAt=0; // something happened — look now
      })
      .catch(()=>{ this.advBusy=false; });
  },

  typeStep(now){
    while(now>=this.nextCharAt && this.typed<this.line.length){
      const c=this.line[this.typed]; this.typed++;
      audio.blip(c, this.who==='a'?0.72:1.3);
      let d=24+Math.random()*40;
      if(c==='.'||c===','||c==='—') d+=220;
      this.nextCharAt=now+d;
    }
    if(this.typed>=this.line.length){
      this.state='idle';
      this.holdUntil=now+Math.max(1500, this.line.length*30);
    }
  },

  update(now){
    if(!this.active) return;

    if(this.replaying){
      if(D.mode==='input'||D.state==='typing'||D.queue.length) return;
      if(this.state==='typing'){ this.typeStep(now); return; }
      if(now<=this.holdUntil) return;
      if(this.replayQueue.length){
        const m=this.replayQueue.shift();
        this.history.push(m);
        this.who=m.who;
        this.line=m.text; this.typed=0;
        this.state='typing'; this.nextCharAt=now+250;
        if(m.who!=='w') audio.say(m.text, m.who);
      } else {
        this.replaying=false;
        this.history=[]; this.pending=[];
        D.queue=['— replay over. back to the live line. —'];
        D.state='idle'; this.holdUntil=now+3000; this.nextPollAt=0;
      }
      return;
    }

    if(now>this.nextPollAt) this.poll(now);
    if(D.mode==='input') return;                   // you are speaking — we listen
    if(D.state==='typing'||D.queue.length) return; // solo line has the floor

    if(this.state==='typing'){ this.typeStep(now); return; }
    if(now<=this.holdUntil) return;

    if(this.pending.length){
      const m=this.pending.shift();
      if(m.room && (rooms[m.room]||DREAM_RE.test(m.room)) && m.room!==D.room) D.switchRoom(m.room, perfNow());
      this.history.push({who:m.who, text:m.body});
      if(this.history.length>40) this.history=this.history.slice(-24);
      this.who=m.who;
      this.line=m.body; this.typed=0;
      this.state='typing'; this.nextCharAt=now+250;
      if(m.who!=='w') audio.say(m.body, m.who);
    } else {
      this.maybeAdvance(now);
    }
  },
};

// ---------- input ----------
const kb=document.getElementById('kb');
function printable(k){ return k.length===1; }

addEventListener('keydown', e=>{
  audio.start();
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  if(D.panel){ D.panel=null; if(e.key==='Escape'){ e.preventDefault(); return; } }
  if(D.mode==='input' && e.key==='ArrowUp'){
    if(D.cmdHist.length){ D.histIdx=Math.min(D.cmdHist.length-1, D.histIdx+1); D.buffer=D.cmdHist[D.cmdHist.length-1-D.histIdx]; }
    e.preventDefault(); return;
  }
  if(D.mode==='input' && e.key==='ArrowDown'){
    if(D.histIdx>0){ D.histIdx--; D.buffer=D.cmdHist[D.cmdHist.length-1-D.histIdx]; }
    else { D.histIdx=-1; D.buffer=''; }
    e.preventDefault(); return;
  }
  if(D.mode!=='input' && e.key==='Enter'){
    if(DLG.paused) DLG.resume(perfNow());
    e.preventDefault(); return;
  }
  if(D.mode!=='input'){
    if(printable(e.key)){
      D.mode='input'; D.buffer='';
    } else return;
  }
  if(e.key==='Enter'){
    const text=D.buffer; D.buffer=''; D.mode='auto';
    if(text.trim()){ D.cmdHist.push(text); if(D.cmdHist.length>50) D.cmdHist.shift(); }
    D.histIdx=-1;
    D.respond(text, perfNow());
  } else if(e.key==='Backspace'){
    D.buffer=D.buffer.slice(0,-1); audio.tick();
    if(D.buffer==='') {/* stay in input, empty */}
  } else if(e.key==='Escape'){
    D.buffer=''; D.mode='auto';
  } else if(printable(e.key) && D.buffer.length<90){
    D.buffer+=e.key; audio.tick();
  }
  e.preventDefault();
});

const T0 = performance.now();
function perfNow(){ return performance.now()-T0; }
const CLOCK0 = 3*3600 + 33*60; // 03:33:00, transmission time
let recDot={x:0,y:0};
let recordZone=null;
let grainFrame=0;

function refreshGrain(){
  const img=grx.createImageData(160,100);
  const d=img.data;
  for(let i=0;i<d.length;i+=4){
    const v=Math.random()*255|0;
    d[i]=d[i+1]=d[i+2]=v; d[i+3]=30;
  }

function drawDialogueLog(){
  if(!(DLG.active||DLG.paused) || !DLG.history.length) return;
  const width=Math.min(cols-8, 100);
  const x0=3;
  const maxRows=Math.max(4, rows-8);
  const lines=[];
  const tail=DLG.history.slice(-8);
  for(let i=0;i<tail.length;i++){
    const m=tail[i];
    const isLast=(i===tail.length-1);
    let txt=m.text;
    if(isLast && DLG.state==='typing') txt=txt.slice(0,DLG.typed);
    const prefix=(m.who==='w') ? 'watcher> ' : 'fable.'+m.who+'> ';
    const words=(prefix+txt).split(' ');
    const wrapped=[]; let cur='';
    for(const w of words){
      const cand=cur? cur+' '+w : w;
      if(cand.length>width && cur){ wrapped.push(cur); cur='      '+w; }
      else cur=cand;
    }
    if(cur) wrapped.push(cur);
    if(isLast && DLG.state==='typing') wrapped[wrapped.length-1]+='█';
    const age=tail.length-1-i;
    for(const l of wrapped) lines.push({t:l, age});
    lines.push({t:'', age});
  }
  if(DLG.advBusy && !DLG.pending.length && DLG.state!=='typing') lines.push({t:'fable.'+(DLG.who==='a'?'b':'a')+'> ···', age:0});
  if(DLG.dormant) lines.push({t:'— the line rests. it spoke its fill for today. —', age:0});
  if(DLG.paused) lines.push({t:'— transmission idle. they are holding their breath. —', age:0});
  const show=lines.slice(-maxRows);
  const y0=(rows-3)-show.length+1;
  for(let k=0;k<show.length;k++){
    const y=y0+k;
    if(y<2 || !show[k].t) continue;
    const alpha=Math.max(0.22, 0.92-show[k].age*0.13);
    gctx.clearRect((x0-1)*cw, y*chh, (width+4)*cw, chh);
    drawString(x0, y, show[k].t, alpha);
  }
}

function drawHeaderAndPrompt(now, t){
  drawDialogueLog();
  // carve out the text bands so no room ever writes over the words
  gctx.clearRect(0, 0, W, chh);
  gctx.clearRect(0, (rows-1)*chh, W, H-(rows-1)*chh);
  // header
  const title=(cols>=100?'VOIDSTATE // ':'')+'FABLEROOMS // TRANSMISSION_'+pad3(D.trans);
  drawString(2,0,title,0.5);
  const lvl=' -=#'.charAt(Math.min(3,Math.floor(clamp(audio.speech,0,1)*3.99)));
  if(DLG.model==='fake' && (DLG.active||DLG.paused)){
    const warn='!! SIMULATION — no model attached — this is not fable !!';
    const wx=Math.max(1, Math.floor(cols/2-warn.length/2));
    gctx.clearRect(0, chh, W, chh);
    drawString(wx, 1, warn, 0.30+0.25*Math.abs(Math.sin(t*2)));
  } else {
    const rl='room: '+D.room+((rooms[D.room]&&rooms[D.room].dreamed)?' — dreamed':'');
    drawString(2, 1, rl, 0.22);
  }
  // clickable doorway to the record
  const recLink='[ the record → ]';
  const recX=cols-recLink.length-2;
  drawString(recX, 1, recLink, 0.28);
  recordZone={x0:recX*cw, y0:1*chh, x1:(recX+recLink.length)*cw, y1:2*chh};
  // pinned panel (help / modes / status)
  if(D.panel){
    if(now>D.panel.until) D.panel=null;
    else{
      const ls=D.panel.lines;
      const w=Math.min(cols-8, Math.max(24, ...ls.map(l=>l.length))+4);
      const x0=3, y0=3;
      const border='+'+('-'.repeat(w-2))+'+';
      gctx.clearRect((x0-1)*cw, (y0-1)*chh, (w+2)*cw, (ls.length+3)*chh);
      drawString(x0, y0, border, 0.45);
      ls.forEach((l,i)=>{ drawString(x0, y0+1+i, '| '+l.slice(0,w-4).padEnd(w-4)+' |', 0.85); });
      drawString(x0, y0+1+ls.length, border, 0.45);
    }
  }
  let mid;
  if(DLG.active && DLG.model==='fake'){
    mid='!! SIMULATION !!';
  } else if(DLG.active){
    mid='a × b — LIVE'+(DLG.mode?' — '+DLG.mode:'')
       +(DLG.watchers?' — '+DLG.watchers+' watching':'')
       +(DLG.model?' — '+DLG.model.replace('claude-','') : '');
  } else {
    mid='LVL '+lvl+' — 60Hz';
  }
  const midX=Math.floor(cols/2-mid.length/2);
  if(midX>title.length+4 && midX+mid.length<cols-22) drawString(midX,0,mid,0.35);
  const secs=CLOCK0+t;
  const hh=String(Math.floor(secs/3600)%24).padStart(2,'0');
  const mm=String(Math.floor(secs/60)%60).padStart(2,'0');
  const ss=String(Math.floor(secs)%60).padStart(2,'0');
  const ff=String(Math.floor((secs%1)*100)).padStart(2,'0');
  const clock=hh+':'+mm+':'+ss+'.'+ff;
  const rstr='REC   '+clock;
  const rx=cols-rstr.length-2;
  if(rx>title.length+3){ drawString(rx,0,rstr,0.5); recDot={x:(rx+4.2)*cw, y:0.5*chh}; }
  else { drawString(rx,1,rstr,0.5); recDot={x:(rx+4.2)*cw, y:1.5*chh}; }

  // bottom line(s)
  const cursor = (Math.floor(now/450)%2===0) ? '█' : ' ';
  const lastRow=rows-1;
  let wrapped=false;
  if(D.mode==='input'){
    if(D.display) drawString(1,lastRow-1,'> '+D.display,0.30);
    drawString(1,lastRow,'you> '+D.buffer+cursor,0.95);
  } else {
    const typingCursor = (D.state==='typing') ? '█' : cursor;
    const full='> '+D.display+typingCursor;
    const maxw=cols-3;
    if(full.length>maxw){
      wrapped=true;
      gctx.clearRect(0,(lastRow-1)*chh,W,chh);
      drawString(1,lastRow-1,full.slice(0,maxw),0.9);
      drawString(1,lastRow,'  '+full.slice(maxw),0.9);
    } else {
      drawString(1,lastRow,full,0.9);
    }
  }
  // hints — one row above the prompt so they never collide with it
  let hint;
  if(!audio.started) hint='[ click or type — sound on ]';
  else if(DLG.paused) hint='[ enter — wake them ]';
  else if(D.mode!=='input') hint= DLG.active ? '[ live · "help" · "topic <words>" ]' : '[ type to speak · "help" ]';
  else hint='[ enter to send · esc to watch ]';
  if(!wrapped){
    const hx=cols-hint.length-2;
    gctx.clearRect((hx-1)*cw, (rows-2)*chh, (hint.length+2)*cw, chh);
    drawString(hx, rows-2, hint, 0.22);
  }
}

function frame(){
  const now=perfNow();
  const t=now/1000;
  D.update(now);
  DLG.update(now);
  const rt=(now-D.roomT0)/1000;

  // --- glyph pass ---
  gctx.clearRect(0,0,W,H);
  vGrid.fill(0);
  for(let i=0;i<cGrid.length;i++) cGrid[i]='';
  rooms[D.room].update(rt+0.0001);

  // room transition dim; scene recedes while the two of them talk
  const trans=clamp((now-D.roomT0)/500,0,1);
  const dim=(0.25+0.75*trans)*((DLG.active&&DLG.history.length)?0.5:1);

  gctx.fillStyle='#fff';
  for(let y=0;y<rows;y++){
    const off=y*cols;
    for(let x=0;x<cols;x++){
      const v=vGrid[off+x]*dim;
      if(v<0.045) continue;
      let ch=cGrid[off+x];
      if(!ch){
        const ri=clamp(Math.floor(v*(RAMP.length-1)+(hash(x,y,7)-0.5)*1.6+0.5),0,RAMP.length-1);
        if(ri<=0) continue;
        ch=RAMP[ri];
      }
      gctx.globalAlpha=clamp(0.16+0.86*v,0,1);
      gctx.fillText(ch,x*cw,y*chh);
    }
  }
  gctx.globalAlpha=1;
  drawHeaderAndPrompt(now,t);

  // --- work pass: glitch slices ---
  wctx.clearRect(0,0,W,H);
  if(D.glitch>0.05){
    const sliceH=chh*2;
    for(let y=0;y<H;y+=sliceH){
      const r=hash(3,y,Math.floor(t*30));
      const dx=(r<0.25)?(r-0.125)*D.glitch*160:0;
      wctx.drawImage(glyph,0,y,W,sliceH,dx,y,W,sliceH);
    }
  } else {
    wctx.drawImage(glyph,0,0);
  }

  // --- compose ---
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  const ab=1.1 + D.glitch*5;
  const channels=[['#ff2412',-ab,0],['#39ff5a',0,0],['#2a35ff',ab,0.5]];
  for(const [col,ox,oy] of channels){
    tctx.globalCompositeOperation='source-over';
    tctx.clearRect(0,0,W,H);
    tctx.drawImage(work,ox,oy);
    tctx.globalCompositeOperation='source-in';
    tctx.fillStyle=col;
    tctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='lighter';
    ctx.drawImage(tint,0,0);
  }

  // amber cast
  ctx.globalCompositeOperation='multiply';
  ctx.fillStyle='#ffd9a6';
  ctx.fillRect(0,0,W,H);

  // scanlines
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle=scanPat;
  ctx.fillRect(0,0,W,H);

  // vignette
  ctx.fillStyle=vignette;
  ctx.fillRect(0,0,W,H);

  // grain
  if((grainFrame++&1)===0) refreshGrain();
  ctx.globalAlpha=0.10;
  ctx.globalCompositeOperation='lighter';
  ctx.drawImage(grainC,0,0,W,H);
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';

  // crt flicker
  const fl=0.02+0.02*Math.sin(t*97)+(Math.random()<0.02?0.04:0);
  ctx.fillStyle='rgba(0,0,0,'+fl.toFixed(3)+')';
  ctx.fillRect(0,0,W,H);

  // REC dot, blinking red
  if(Math.floor(t*1.2)%2===0){
    ctx.fillStyle='#ff3527';
    ctx.beginPath();
    ctx.arc(recDot.x,recDot.y,3.2,0,7);
    ctx.fill();
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
window.FR = { D, DLG, rooms, audio, ROOM_ORDER, now: perfNow }; // debug handle
</script>
